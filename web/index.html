<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Metadex Pokemon Simulator lets you simulate Pokemon battles, explore Pokemon stats, and test strategies online.">
  <meta name="keywords"
    content="Metadex Pokemon Simulator, Pokemon simulator, Pokemon battle simulator, Pokemon strategy tool, cobblemon, pokedex">
  <meta name="author" content="Metadex">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://metadex.app/">
  <meta property="og:title" content="Metadex Pokemon Simulator">
  <meta property="og:description" content="A browser-based Pokemon simulator and strategy tool.">
  <meta property="og:image" content="icons/Icon-192.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://metadex.app/">
  <meta property="twitter:title" content="Metadex Pokemon Simulator">
  <meta property="twitter:description" content="A browser-based Pokemon simulator and strategy tool.">
  <meta property="twitter:image" content="icons/Icon-192.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Metadex">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Metadex Pokemon Simulator</title>
  <link rel="manifest" href="manifest.json">

  <!-- Structured Data for Google -->
  <script type="application/ld+json">
  {
   "@context": "https://schema.org",
   "@type": "WebSite",
   "name": "Metadex Pokemon Simulator",
   "url": "https://pr0d-g.github.io/metadex/"
  }
  </script>
</head>

<body>
  <!-- Hidden SEO Content for Crawlers -->
  <div style="display: none;" id="seo-content" aria-hidden="true">
    <h1>Metadex Pokemon Simulator</h1>
    <p>
      Metadex Pokemon Simulator is an online tool to simulate Pokemon battles,
      analyze Pokemon stats, and test strategies.
    </p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
